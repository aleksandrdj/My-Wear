<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Weather AI Pro - Дарья</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-main: #F3F8FF;
            --primary: #628EFF;
            --grad: linear-gradient(145deg, #628EFF 0%, #8740FF 100%);
            --shadow-soft: 10px 10px 20px rgba(163, 177, 198, 0.2);
            --inner-shadow: inset 4px 4px 10px rgba(0,0,0,0.05), inset -4px -4px 10px #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background-color: var(--bg-main);
            color: #313945;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }

        #weather-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .main-weather-card {
            background: var(--grad);
            border-radius: 45px;
            box-shadow: 0 25px 50px rgba(98, 142, 255, 0.3);
            position: relative;
            overflow: hidden;
            color: white;
            padding: 40px 30px;
        }

        .main-weather-card::after {
            content: '';
            position: absolute;
            top: -20%; right: -15%;
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 75%);
            border-radius: 50%;
        }

        /* Навигация (Исправлено) */
        .nav-pills {
            background: #E6EEF8;
            border-radius: 30px;
            padding: 5px;
            display: flex;
            box-shadow: var(--inner-shadow);
            width: 100%;
            align-items: center;
        }

        .nav-pills button {
            flex: 1;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            border-radius: 25px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #7d8bb2;
            border: none;
            outline: none;
            background: transparent;
        }

        .nav-pills button.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        /* Почасовой список (Исправлено) */
        .hourly-scroll-container {
            margin: 0 -28px; /* Расширяем до краев экрана */
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .hourly-scroll-container::-webkit-scrollbar { display: none; }

        #hourly-list {
            padding: 30px 28px; /* Огромный отступ сверху (для взлета) и по бокам (слева больше не режет) */
            display: inline-flex;
            gap: 16px;
        }

        .hour-pill {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 25px;
            min-width: 75px;
            height: 135px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 10px;
            box-shadow: 0 4px 12px rgba(163, 177, 198, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s, box-shadow 0.3s;
            flex-shrink: 0;
        }

        .hour-pill.active {
            background: var(--grad);
            color: white;
            transform: translateY(-12px); /* Взлетает выше, места теперь много */
            box-shadow: 0 15px 25px rgba(98, 142, 255, 0.3);
            border: none;
        }

        .ai-glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 15px 15px 35px rgba(163, 177, 198, 0.2);
        }

        .ai-text {
            font-size: 14px;
            line-height: 1.8;
            color: #4a5568;
        }

        .ai-text b {
            color: var(--primary);
            display: block;
            margin-top: 15px;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .pt-safe { padding-top: env(safe-area-inset-top); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

        .dots span {
            width: 6px; height: 6px; background: var(--primary);
            border-radius: 50%; display: inline-block;
            animation: dot-bounce 1.4s infinite ease-in-out both;
        }
        .dots span:nth-child(1) { animation-delay: -0.32s; }
        .dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes dot-bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="pt-safe">

    <canvas id="weather-canvas"></canvas>

    <div class="max-w-md mx-auto px-7 pb-12 relative z-10">
        
        <div class="flex flex-col items-center mt-6 mb-8">
            <div class="flex items-center gap-2 mb-1">
                <i class="fas fa-location-dot text-[#628EFF] text-xl"></i>
                <span id="city-label" class="text-2xl font-extrabold tracking-tight text-[#313945]">Москва</span>
            </div>
            <span id="date-label" class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Сегодня</span>
        </div>

        <div class="mb-10">
            <div class="nav-pills">
                <button onclick="changeLoc('moscow')" id="btn-moscow" class="active">Москва</button>
                <button onclick="changeLoc('adler')" id="btn-adler">Адлер</button>
                <button onclick="getGPS()" id="btn-gps"><i class="fas fa-location-arrow"></i></button>
            </div>
        </div>

        <!-- ГЛАВНАЯ КАРТОЧКА -->
        <div class="main-weather-card flex flex-col items-center mb-10 relative">
            <div id="card-loader" class="hidden absolute inset-0 bg-white/10 backdrop-blur-md z-50 flex items-center justify-center rounded-[45px]">
                <i class="fas fa-circle-notch fa-spin text-white text-3xl"></i>
            </div>
            
            <div class="flex w-full justify-between items-start mb-4 px-2">
                <div id="condition-label" class="text-white/80 font-bold uppercase tracking-[0.2em] text-sm">...</div>
                <i id="main-icon" class="fas fa-sun text-6xl text-yellow-300 drop-shadow-xl transition-all duration-700"></i>
            </div>
            
            <div id="temp-val" class="text-[100px] font-extrabold leading-none mb-6 tracking-tighter" style="text-shadow: 0 10px 20px rgba(0,0,0,0.1)">--°</div>
            
            <div class="flex w-full justify-around mt-6 pt-8 border-t border-white/20">
                <div class="flex flex-col items-center">
                    <i class="fas fa-umbrella text-white/50 text-[10px] mb-2"></i>
                    <span id="rain-val" class="text-[14px] font-black tracking-tighter">--%</span>
                    <span class="text-[9px] font-bold uppercase opacity-60">Осадки</span>
                </div>
                <div class="flex flex-col items-center border-x border-white/20 px-8">
                    <i class="fas fa-droplet text-white/50 text-[10px] mb-2"></i>
                    <span id="hum-val" class="text-[14px] font-black tracking-tighter">--%</span>
                    <span class="text-[9px] font-bold uppercase opacity-60">Влажн.</span>
                </div>
                <div class="flex flex-col items-center">
                    <i class="fas fa-wind text-white/50 text-[10px] mb-2"></i>
                    <span id="wind-val" class="text-[14px] font-black tracking-tighter">-- м/с</span>
                    <span class="text-[9px] font-bold uppercase opacity-60">Ветер</span>
                </div>
            </div>
        </div>

        <!-- Почасовой прогноз -->
        <div class="mb-12">
            <div class="flex justify-between items-center mb-2 px-1">
                <span class="text-[16px] font-extrabold text-[#313945]">Сегодня</span>
                <a href="https://yandex.ru/pogoda/ru" target="_blank" class="text-[11px] font-bold text-[#628EFF] uppercase tracking-widest flex items-center gap-1 hover:opacity-70 active:scale-95 transition-all">
                    ПРОГНОЗ ЯНДЕКС <i class="fas fa-chevron-right text-[8px]"></i>
                </a>
            </div>
            <div class="hourly-scroll-container">
                <div id="hourly-list">
                    <!-- Плитки генерируются в JS -->
                </div>
            </div>
        </div>

        <!-- БЛОК ДАРЬИ -->
        <div class="ai-glass-card p-8 mb-8 relative overflow-hidden transition-all hover:scale-[1.01]">
            <div class="absolute top-[-10px] right-[-10px] opacity-5 pointer-events-none">
                <i class="fas fa-baby-carriage text-8xl"></i>
            </div>
            
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 bg-gradient-to-br from-[#628EFF] to-[#8740FF] rounded-2xl flex items-center justify-center shadow-xl">
                    <i class="fas fa-wand-magic-sparkles text-white text-[18px]"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-[#628EFF]">Для Дарьи (<span id="age-label">...</span>)</span>
                    <span class="text-[15px] font-extrabold text-[#313945]">Детальный разбор гардероба</span>
                </div>
            </div>
            
            <div id="ai-advice" class="ai-text font-bold">
                <div class="dots py-4"><span></span><span></span><span></span></div>
                <p class="text-xs text-gray-400 mt-2">Анализирую погоду для малышки...</p>
            </div>
            
            <button onclick="toggleChat(true)" class="mt-8 w-full py-5 bg-white hover:bg-gray-50 transition-all rounded-[25px] text-[11px] font-black uppercase tracking-widest text-[#628EFF] border border-gray-100 shadow-sm flex items-center justify-center gap-2">
                СПРОСИТЬ АССИСТЕНТА <i class="fas fa-arrow-right text-[9px] opacity-40"></i>
            </button>
        </div>

    </div>

    <!-- ЧАТ МОДАЛКА -->
    <div id="chat-modal" class="fixed inset-0 bg-black/40 backdrop-blur-2xl z-50 hidden flex-col justify-end">
        <div class="bg-white w-full rounded-t-[50px] p-8 pb-safe shadow-2xl transition-all">
            <div class="w-16 h-1.5 bg-gray-200 rounded-full mx-auto mb-10"></div>
            <div id="chat-history" class="max-h-[40vh] overflow-y-auto mb-8 space-y-6 px-1 text-sm font-bold text-[#313945]">
                <div class="bg-indigo-50 p-6 rounded-[35px] rounded-tl-none shadow-sm leading-relaxed">
                    Привет! Я помогу подобрать гардероб для Дарьи. Ей сейчас <span class="d-age">...</span>. Что вас интересует?
                </div>
            </div>
            <div class="flex gap-3 items-center">
                <input id="chat-input" type="text" placeholder="Ваш вопрос..." class="flex-1 bg-gray-100 rounded-[25px] px-7 py-5 outline-none font-bold text-[15px]">
                <button onclick="sendChat()" class="bg-[#628EFF] text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl shadow-indigo-100">
                    <i class="fas fa-paper-plane text-lg"></i>
                </button>
            </div>
            <button onclick="toggleChat(false)" class="mt-8 w-full text-center text-gray-400 font-bold text-[11px] uppercase tracking-widest">Закрыть</button>
        </div>
    </div>

    <script>
        const GROQ_KEY = "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";
        const BIRTH = "2024-10-15";
        const CITIES = {
            moscow: { name: 'Москва', lat: 55.75, lon: 37.61 },
            adler: { name: 'Адлер', lat: 43.43, lon: 39.91 }
        };

        let currentAge = "";
        let weatherData = null;
        let canvas, ctx, clouds = [];

        function initClouds() {
            canvas = document.getElementById('weather-canvas');
            ctx = canvas.getContext('2d');
            resize();
            window.addEventListener('resize', resize);
            for(let i=0; i<5; i++) clouds.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height*0.5, r: 150+Math.random()*200, v: 0.1+Math.random()*0.2, o: 0.1+Math.random()*0.15 });
            animate();
        }
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            clouds.forEach(c => {
                c.x += c.v; if(c.x-c.r > canvas.width) c.x = -c.r;
                const g = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
                g.addColorStop(0, `rgba(255,255,255,${c.o})`); g.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        function updateAge() {
            const b = new Date(BIRTH); const n = new Date();
            let y = n.getFullYear() - b.getFullYear();
            let m = n.getMonth() - b.getMonth();
            if (m < 0 || (m === 0 && n.getDate() < b.getDate())) { y--; m += 12; }
            const decl = (v, arr) => { const c = [2, 0, 1, 1, 1, 2]; return v + " " + arr[(v%100>4 && v%100<20)?2:c[(v%10<5)?v%10:5]]; };
            currentAge = `${decl(y, ["год","года","лет"])} ${decl(m, ["месяц","месяца","месяцев"])}`;
            document.getElementById('age-label').innerText = currentAge;
            document.querySelectorAll('.d-age').forEach(e => e.innerText = currentAge);
        }

        async function callAI(messages) {
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: messages, temperature: 0.6, max_tokens: 1024 })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (e) { return "Ошибка ИИ. Проверьте соединение."; }
        }

        async function getAdvice() {
            const el = document.getElementById('ai-advice');
            el.innerHTML = `<div class="dots py-4"><span></span><span></span><span></span></div>`;
            const city = document.getElementById('city-label').innerText;
            const temp = Math.round(weatherData.current.temperature_2m);
            const status = getCond(weatherData.current.weather_code);
            const messages = [
                { role: "system", content: `Ты — эксперт по детскому гардеробу. Малышка Дарья, ей сейчас ${currentAge} (род. 15.10.2024). Она активно ходит. Отвечай КРАТКО (3-5 предложений), но емко. Разбор по пунктам (<b>Слои</b>, <b>Голова</b>, <b>Обувь</b>). Используй теги <b>.` },
                { role: "user", content: `Погода в ${city}: ${temp}°C, ${status}, ветер ${Math.round(weatherData.current.wind_speed_10m)} м/с. Что надеть Дарье?` }
            ];
            const text = await callAI(messages);
            el.innerHTML = text.replace(/\n/g, '<br>');
        }

        async function fetchWeather(lat, lon) {
            document.getElementById('card-loader').classList.remove('hidden');
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,precipitation,is_day&hourly=temperature_2m,weather_code&timezone=auto&forecast_days=1`);
                weatherData = await res.json();
                renderUI(); getAdvice();
            } catch(e) {}
            document.getElementById('card-loader').classList.add('hidden');
        }

        function renderUI() {
            const c = weatherData.current;
            document.getElementById('temp-val').innerText = `${Math.round(c.temperature_2m)}°`;
            document.getElementById('condition-label').innerText = getCond(c.weather_code);
            document.getElementById('hum-val').innerText = `${c.relative_humidity_2m}%`;
            document.getElementById('wind-val').innerText = `${Math.round(c.wind_speed_10m)}`;
            document.getElementById('rain-val').innerText = `${c.precipitation || 0}%`;
            
            const mainIcon = document.getElementById('main-icon');
            const iData = getIcon(c.weather_code, c.is_day);
            mainIcon.className = `fas ${iData.icon} text-7xl transition-all duration-1000`;
            mainIcon.style.color = c.weather_code <= 2 ? (c.is_day?'#fbbf24':'#FFF') : '#cbd5e1';

            const list = document.getElementById('hourly-list');
            list.innerHTML = '';
            const now = new Date().getHours();
            for(let i=now; i<now+10; i++) {
                const idx = i%24; const temp = Math.round(weatherData.hourly.temperature_2m[idx]);
                const code = weatherData.hourly.weather_code[idx]; const isD = idx>6 && idx<21;
                const icon = getIcon(code, isD);
                list.innerHTML += `<div class="hour-pill ${i===now?'active':''}">
                    <span class="text-[10px] font-black uppercase opacity-60">${idx}:00</span>
                    <i class="fas ${icon.icon} text-2xl"></i>
                    <span class="text-[15px] font-extrabold">${temp}°</span>
                </div>`;
            }
        }

        function getCond(c) {
            const m = {0:'Ясно',1:'Ясно',2:'Облачно',3:'Пасмурно',45:'Туман',61:'Дождь',71:'Снег',95:'Гроза'};
            return m[c] || 'Облачно';
        }
        function getIcon(c, d) {
            if(c===0) return { icon: d?'fa-sun':'fa-moon' };
            if(c<=2) return { icon: d?'fa-cloud-sun':'fa-cloud-moon' };
            if(c===3) return { icon: 'fa-cloud' };
            if(c>=61 && c<=67) return { icon: 'fa-cloud-rain' };
            if(c>=71 && c<=77) return { icon: 'fa-snowflake' };
            return { icon: 'fa-cloud' };
        }

        function changeLoc(key) {
            document.getElementById('btn-moscow').classList.toggle('active', key==='moscow');
            document.getElementById('btn-adler').classList.toggle('active', key==='adler');
            document.getElementById('btn-gps').classList.remove('active');
            document.getElementById('city-label').innerText = CITIES[key].name;
            fetchWeather(CITIES[key].lat, CITIES[key].lon);
        }

        function getGPS() {
            if(!navigator.geolocation) return alert("GPS не поддерживается");
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('city-label').innerText = "Моя локация";
                fetchWeather(p.coords.latitude, p.coords.longitude);
            });
        }

        function toggleChat(s) { document.getElementById('chat-modal').style.display = s?'flex':'none'; }
        async function sendChat() {
            const input = document.getElementById('chat-input'); if(!input.value) return;
            const text = input.value; const hist = document.getElementById('chat-history');
            hist.innerHTML += `<div class="text-right ml-10 mb-4"><div class="bg-gray-100 p-5 rounded-[30px] rounded-tr-none inline-block shadow-sm">${text}</div></div>`;
            input.value = '';
            const msgs = [{ role: "system", content: `Ответь кратко о Дарье (${currentAge}).` }, { role: "user", content: text }];
            const resp = await callAI(msgs);
            hist.innerHTML += `<div class="mr-10 mb-4"><div class="bg-indigo-50 p-6 rounded-[35px] rounded-tl-none border border-indigo-100 shadow-sm">${resp.replace(/\n/g, '<br>')}</div></div>`;
            hist.scrollTop = hist.scrollHeight;
        }

        window.onload = () => {
            updateAge(); initClouds();
            const opt = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date-label').innerText = new Date().toLocaleDateString('ru-RU', opt);
            changeLoc('moscow');
        };
    </script>
</body>
</html>
